# Pull Request Validation
# Runs on all PRs to main/develop - lightweight checks without deployment

name: PR Validation

on:
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Quick lint and type check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck

      - name: Lint infra
        working-directory: infra
        run: |
          pnpm install --frozen-lockfile
          pnpm build

  # HAL/HATEOAS compliance check
  hal-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Check HAL compliance
        run: |
          cd tools && go run ./cmd/verify-hal-compliance --frontend

  # Backend tests
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test backend
        working-directory: backend
        run: |
          go mod download
          go test -v -race ./...

  # Frontend tests
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Test frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm test -- --passWithNoTests

  # Build verification (no deploy)
  build-check:
    runs-on: ubuntu-latest
    needs: [lint, hal-compliance, backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build backend
        working-directory: backend
        run: |
          go mod download
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o dist/bootstrap ./...

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build
