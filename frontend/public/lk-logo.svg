      LEAPKICK
    </text>

    <g font-family="sans-serif" font-weight="700" font-size="80" letter-spacing="0" stroke-linejoin="round" paint-order="stroke fill" transform="scale(2, 1)">
      <text x="0" y="0">
        <tspan fill="#3498db" stroke="#2171a1" stroke-width="2">LEAP</tspan><tspan fill="#e67e22" stroke="#a3540d" stroke-width="2">KICK</tspan>
