          font-family="sans-serif" font-weight="700" font-size="80" 
          fill="#666666" stroke="#666666" stroke-width="18" 
          stroke-linejoin="round" letter-spacing="0" transform="scale(2, 1)">
      LEAPKICK
    </text>
    
    <text x="0" y="0" 
          font-family="sans-serif" font-weight="700" font-size="80" 
